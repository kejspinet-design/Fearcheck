<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://fearproject.ru https://reafsavers.vercel.app;">
    <title>API Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1d29; color: white; }
        .test { margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 8px; }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
        pre { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; overflow-x: auto; }
        button { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>🧪 API Endpoints Test</h1>
    <button onclick="testAll()">Test All APIs</button>
    
    <div id="results"></div>
    
    <script src="js/SecurityUtils.js"></script>
    <script>
        const results = document.getElementById('results');
        
        async function testEndpoint(name, url) {
            const div = document.createElement('div');
            div.className = 'test';
            div.innerHTML = `<h3>Testing: ${name}</h3><p>URL: ${url}</p><p>Loading...</p>`;
            results.appendChild(div);
            
            try {
                const start = Date.now();
                const response = await fetch(url);
                const time = Date.now() - start;
                
                let data;
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    data = await response.text();
                }
                
                if (response.ok) {
                    let summary = '';
                    if (Array.isArray(data)) {
                        summary = `Array with ${data.length} items`;
                    } else if (typeof data === 'object') {
                        summary = `Object with keys: ${Object.keys(data).join(', ')}`;
                    }
                    
                    div.innerHTML = `
                        <h3 class="success">✅ ${name}</h3>
                        <p>URL: ${url}</p>
                        <p>Status: ${response.status} ${response.statusText}</p>
                        <p>Time: ${time}ms</p>
                        <p>Type: ${summary}</p>
                        <pre>${JSON.stringify(data, null, 2).substring(0, 1000)}</pre>
                    `;
                } else {
                    div.innerHTML = `
                        <h3 class="error">❌ ${name}</h3>
                        <p>URL: ${url}</p>
                        <p>Status: ${response.status} ${response.statusText}</p>
                        <p>Time: ${time}ms</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                div.innerHTML = `
                    <h3 class="error">❌ ${name}</h3>
                    <p>URL: ${url}</p>
                    <p>Error: ${error.message}</p>
                `;
            }
        }
        
        async function testAll() {
            results.innerHTML = '';
            
            await testEndpoint('1. Fear Servers', '/api/fear/servers');
            await testEndpoint('2. Fear Reports', '/api/fear/reports/recent');
            await testEndpoint('3. Reports (alias)', '/api/reports/recent');
            await testEndpoint('4. Player Profile', '/api/player?steamid=76561199527803276');
            await testEndpoint('5. UMA Ban Check', '/api/uma?steamid=76561199527803276');
            
            console.log('All tests completed');
        }
        
        // Auto-run on load
        window.addEventListener('DOMContentLoaded', testAll);
    </script>
</body>
</html>
