<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test - Fear Protection</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }
        button {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .success {
            color: #4ade80;
        }
        .error {
            color: #f87171;
        }
        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin-right: 15px;
        }
        .player-info {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>API Тест - Fear Protection</h1>
        
        <div class="test-section">
            <h2>Тест 1: Прямой запрос к Fear API</h2>
            <button onclick="testDirectAPI()">Тест API /profile/76561199847445471</button>
            <div id="directResult" class="result"></div>
        </div>
        
        <div class="test-section">
            <h2>Тест 2: Локальный прокси (если сервер запущен)</h2>
            <button onclick="testLocalProxy()">Тест /api/player?steamid=76561199847445471</button>
            <div id="proxyResult" class="result"></div>
        </div>
        
        <div class="test-section">
            <h2>Тест 3: Проверка парсинга config.vdf</h2>
            <button onclick="testConfigParser()">Тест парсинга test-config.vdf</button>
            <div id="parserResult" class="result"></div>
        </div>
        
        <div class="test-section">
            <h2>Тест 4: Полная проверка игрока</h2>
            <button onclick="testFullCheck()">Полная проверка (бан + данные)</button>
            <div id="fullResult" class="result"></div>
        </div>
    </div>
    
    <script>
        async function testDirectAPI() {
            const resultDiv = document.getElementById('directResult');
            resultDiv.innerHTML = 'Запрос к API...';
            
            try {
                const response = await fetch('https://api.fearproject.ru/profile/76561199847445471');
                const data = await response.json();
                
                let html = `<div class="player-info">
                    <img src="${data.avatar_full || data.avatar}" alt="Avatar" class="avatar">
                    <div>
                        <strong>Ник:</strong> ${data.name || 'Не указан'}<br>
                        <strong>Steam ID:</strong> ${data.steamid}<br>
                        <strong>Аватар:</strong> ${data.avatar_full || data.avatar || 'Нет'}
                    </div>
                </div>`;
                
                html += `<pre class="success">${JSON.stringify(data, null, 2)}</pre>`;
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">Ошибка: ${error.message}</pre>`;
            }
        }
        
        async function testLocalProxy() {
            const resultDiv = document.getElementById('proxyResult');
            resultDiv.innerHTML = 'Запрос к локальному прокси...';
            
            try {
                const response = await fetch('/api/player?steamid=76561199847445471');
                const data = await response.json();
                
                let html = `<div class="player-info">
                    <img src="${data.avatar_full || data.avatar}" alt="Avatar" class="avatar">
                    <div>
                        <strong>Ник:</strong> ${data.name || 'Не указан'}<br>
                        <strong>Steam ID:</strong> ${data.steamid}<br>
                        <strong>Аватар:</strong> ${data.avatar_full || data.avatar || 'Нет'}
                    </div>
                </div>`;
                
                html += `<pre class="success">${JSON.stringify(data, null, 2)}</pre>`;
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">Ошибка: ${error.message}<br>Убедитесь, что локальный сервер запущен (node server.js)</pre>`;
            }
        }
        
        async function testConfigParser() {
            const resultDiv = document.getElementById('parserResult');
            resultDiv.innerHTML = 'Чтение и парсинг файла...';
            
            try {
                const response = await fetch('test-config.vdf');
                const content = await response.text();
                
                // Парсинг Steam ID
                const steamIdPattern = /7656119\d{10}/g;
                const matches = content.match(steamIdPattern);
                const uniqueIds = matches ? [...new Set(matches)] : [];
                
                let html = `<strong>Найдено Steam ID:</strong> ${uniqueIds.length}<br>`;
                html += `<strong>Список:</strong><br>`;
                uniqueIds.forEach(id => {
                    html += `- ${id}<br>`;
                });
                
                html += `<pre>${content}</pre>`;
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">Ошибка: ${error.message}</pre>`;
            }
        }
        
        async function testFullCheck() {
            const resultDiv = document.getElementById('fullResult');
            resultDiv.innerHTML = 'Выполнение полной проверки...';
            
            try {
                // Проверка бана
                const fearResponse = await fetch('/api/fear?q=76561199847445471&page=1&limit=10&type=1');
                const fearData = await fearResponse.json();
                
                // Получение данных игрока
                const playerResponse = await fetch('/api/player?steamid=76561199847445471');
                const playerData = await playerResponse.json();
                
                let html = `<div class="player-info">
                    <img src="${playerData.avatar_full || playerData.avatar}" alt="Avatar" class="avatar">
                    <div>
                        <strong>Ник:</strong> ${playerData.name || 'Не указан'}<br>
                        <strong>Steam ID:</strong> ${playerData.steamid}<br>
                        <strong>Статус бана:</strong> ${fearData.punishments && fearData.punishments.length > 0 ? 'Забанен' : 'Чист'}
                    </div>
                </div>`;
                
                html += `<h3>Данные игрока:</h3><pre>${JSON.stringify(playerData, null, 2)}</pre>`;
                html += `<h3>Данные бана:</h3><pre>${JSON.stringify(fearData, null, 2)}</pre>`;
                
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">Ошибка: ${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
