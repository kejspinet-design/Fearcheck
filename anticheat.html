<html lang="ru">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/base.css?v=2">
    <link rel="stylesheet" href="css/style.css?v=2">

    <link rel="stylesheet" href="css/check.css?v=2">
    <link rel="stylesheet" href="css/easter-egg.css">
    
    <style>
        /* Allow scroll */
        body {
            overflow-y: hidden !important;
            overflow-x: hidden !important;
            height: 100vh !important;
            min-height: 100vh !important;
            background: #1a1d29;
        }
        
        .container {
            overflow-y: hidden !important;
            overflow-x: hidden !important;
            height: 100vh !important;
            min-height: 100vh !important;
        }
        
        /* Animated Background */
        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .floating-dots {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(185, 28, 28, 0.6);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }
        
        .dot:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 15s; }
        .dot:nth-child(2) { left: 20%; top: 80%; animation-delay: 2s; animation-duration: 18s; }
        .dot:nth-child(3) { left: 30%; top: 40%; animation-delay: 4s; animation-duration: 22s; }
        .dot:nth-child(4) { left: 40%; top: 60%; animation-delay: 1s; animation-duration: 20s; }
        .dot:nth-child(5) { left: 50%; top: 30%; animation-delay: 3s; animation-duration: 17s; }
        .dot:nth-child(6) { left: 60%; top: 70%; animation-delay: 5s; animation-duration: 19s; }
        .dot:nth-child(7) { left: 70%; top: 50%; animation-delay: 2.5s; animation-duration: 21s; }
        .dot:nth-child(8) { left: 80%; top: 25%; animation-delay: 4.5s; animation-duration: 16s; }
        .dot:nth-child(9) { left: 90%; top: 75%; animation-delay: 1.5s; animation-duration: 23s; }
        .dot:nth-child(10) { left: 15%; top: 55%; animation-delay: 3.5s; animation-duration: 18s; }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translate(30px, -30px) scale(1.2);
                opacity: 0.6;
            }
            50% {
                transform: translate(-20px, 20px) scale(0.8);
                opacity: 0.4;
            }
            75% {
                transform: translate(20px, 30px) scale(1.1);
                opacity: 0.5;
            }
        }
        
        .red-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(185, 28, 28, 0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
            }
        }
        
        /* HEADER OVERRIDE - FORCE STYLES */
        .header {
            background: rgba(10, 10, 15, 0.05) !important;
            padding: 1.5rem 2.5rem !important;
        }
        
        /* Allow scroll on anticheat page - override check.css */
        body {
            overflow-y: hidden !important;
            overflow-x: hidden !important;
            height: 100vh !important;
            min-height: 100vh !important;
        }
        
        .container {
            overflow-y: hidden !important;
            overflow-x: hidden !important;
            height: 100vh !important;
            min-height: 100vh !important;
        }
        
        /* Players Grid */
        #anticheat-players-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }
        
        @media (max-width: 1600px) {
            #anticheat-players-list {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (max-width: 1200px) {
            #anticheat-players-list {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (max-width: 900px) {
            #anticheat-players-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 600px) {
            #anticheat-players-list {
                grid-template-columns: 1fr;
            }
        }
        
        /* Player Card Styles (Compact Design) */
        .player-card {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .player-card:hover {
            border-color: rgba(255, 100, 100, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 100, 100, 0.2);
        }
        
        .player-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .player-avatar-large {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255, 100, 100, 0.5);
        }
        
        .player-info-header {
            flex: 1;
            min-width: 0;
        }
        
        .player-name {
            font-size: 16px;
            font-weight: 700;
            color: white;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .player-steamid {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .account-age-section {
            background: rgba(20, 20, 20, 0.8);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 3px solid #ff4444;
        }
        
        .account-age-section.old {
            border-left-color: #44ff44;
        }
        
        .age-badge-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        
        .age-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
        
        .age-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
        }
        
        .age-indicator.old {
            background: #44ff44;
        }
        
        .age-text {
            font-size: 14px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
        }
        
        .age-date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .server-info {
            background: rgba(20, 20, 20, 0.8);
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .server-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .server-name {
            font-size: 13px;
            font-weight: 600;
            color: white;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 6px;
        }
        
        .ip-badge {
            background: rgba(255, 100, 100, 0.3);
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 11px;
            display: inline-block;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .stat-box {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }
        
        .stat-value.kills {
            color: #44ff44;
        }
        
        .stat-value.deaths {
            color: #ff4444;
        }
        
        .stat-value.ping {
            color: #ff4444;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .action-btn-large {
            background: rgba(60, 60, 60, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        .action-btn-large:hover {
            background: rgba(80, 80, 80, 0.9);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }
        
        .copy-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .copy-btn {
            background: rgba(40, 40, 40, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .copy-btn:hover {
            background: rgba(60, 60, 60, 0.9);
            border-color: rgba(255, 100, 100, 0.5);
        }
        
        .connect-btn {
            background: #4a90e2;
            border: none;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        
        .connect-btn:hover {
            background: #357abd;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
        }
    </style>
</head>
