    <style>
        body {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            min-height: 100vh !important;
            background: #1a1d29;
        }
        
        .container {
            overflow-y: visible !important;
            min-height: 100vh !important;
        }
        
        /* HEADER OVERRIDE */
        .header {
            background: rgba(10, 10, 15, 0.05) !important;
            padding: 1.5rem 2.5rem !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border: none !important;
            box-shadow: none !important;
        }
        
        .header::before {
            display: none !important;
        }
        
        /* Tracking Content */
        .tracking-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .tracking-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .tracking-title {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
        
        .tracking-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* Search Box */
        .search-box {
            background: rgba(30, 30, 30, 0.9);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
        }
        
        .search-input-group {
            display: flex;
            gap: 15px;
        }
        
        .search-input {
            flex: 1;
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px 20px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.6);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }
        
        .search-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 16px 40px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        /* Results */
        .results-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        @media (max-width: 1200px) {
            .results-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .results-container {
                grid-template-columns: 1fr;
            }
        }
        
        .result-card {
            background: linear-gradient(135deg, rgba(30, 30, 40, 0.95) 0%, rgba(20, 20, 30, 0.95) 100%);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #667eea 100%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .result-card:hover {
            border-color: rgba(102, 126, 234, 0.8);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4), 0 0 40px rgba(102, 126, 234, 0.2);
        }
        
        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .result-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 3px solid transparent;
            background: linear-gradient(135deg, #667eea, #764ba2) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }
        
        .result-card:hover .result-avatar {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .result-info {
            flex: 1;
            min-width: 0;
        }
        
        .result-info h3 {
            font-size: 18px;
            color: white;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .result-steamid {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .result-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            background: rgba(15, 15, 20, 0.6);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(10px);
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .detail-value {
            font-size: 13px;
            color: white;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        
        .actions-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: auto;
        }
        
        .action-btn {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        
        .action-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .action-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .action-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        
        .action-btn:active {
            transform: translateY(-2px);
        }
        
        .btn-copy {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(102, 126, 234, 0.1) 100%);
            border-color: rgba(102, 126, 234, 0.5);
            color: #667eea;
        }
        
        .btn-copy:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(102, 126, 234, 0.2) 100%);
            border-color: #667eea;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .btn-connect {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(34, 197, 94, 0.1) 100%);
            border-color: rgba(34, 197, 94, 0.5);
            color: #22c55e;
        }
        
        .btn-connect:hover {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.3) 0%, rgba(34, 197, 94, 0.2) 100%);
            border-color: #22c55e;
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.5);
        }
        
        .btn-profile {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2) 0%, rgba(168, 85, 247, 0.1) 100%);
            border-color: rgba(168, 85, 247, 0.5);
            color: #a855f7;
        }
        
        .btn-profile:hover {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.3) 0%, rgba(168, 85, 247, 0.2) 100%);
            border-color: #a855f7;
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5);
        }
        
        .btn-remove {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0.1) 100%);
            border-color: rgba(239, 68, 68, 0.5);
            color: #ef4444;
            grid-column: 1 / -1;
            margin-top: 8px;
        }
        
        .btn-remove:hover {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.3) 0%, rgba(239, 68, 68, 0.2) 100%);
            border-color: #ef4444;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .empty-icon {
            font-size: 80px;

        }
        
        .empty-text {
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .empty-subtext {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

    <script>
        // Защита от консоли и DevTools
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.shiftKey && e.key === 'J') || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });
        
        const apiClient = new APIClient({
            steamApiKey: '4CE8017CEC2702E4A9200A4BAD93513E',
            accessToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJjbGllbnRfaWQiOiI3NjU2MTE5OTUyNDc4MDMyNyIsImlhdCI6MTc4MTUyMDQwNCwiZXhwIjoxNzg0MTEyNDA0fQ.mRPdNR_NwLZA4n3SaQaJZR2n2CVa7-PEuG1zDaBAKCc',
            cookieDomain: '.fearproject.ru'
        });
        
        // Tracking functionality
        let trackedPlayers = [];
        
        // Load tracked players from localStorage with validation
        try {
            const stored = localStorage.getItem('trackedPlayers');
            if (stored) {
                const parsed = JSON.parse(stored);
                // Ensure all items are strings (Steam IDs), not objects
                if (Array.isArray(parsed)) {
                    trackedPlayers = parsed.filter(item => typeof item === 'string' && /^765\d{14}$/.test(item));
                    // Save back cleaned data
                    if (trackedPlayers.length !== parsed.length) {
                        localStorage.setItem('trackedPlayers', JSON.stringify(trackedPlayers));
                        console.warn('[Tracking] Cleaned invalid Steam IDs from localStorage');
                    }
                }
            }
        } catch (error) {
            console.error('[Tracking] Error loading tracked players:', error);
            trackedPlayers = [];
            localStorage.setItem('trackedPlayers', JSON.stringify(trackedPlayers));
        }
        
        let serversData = [];
        let reportsData = [];
        
        // Fetch reports data
        async function fetchReports() {
            try {
                const reports = await apiClient.fetchReports();
                reportsData = Array.isArray(reports) ? reports : [];
                console.log('[Tracking] Reports loaded:', reportsData.length);
                return reportsData;
            } catch (error) {
                console.error('[Tracking] Error fetching reports:', error);
                return [];
            }
        }
        
        // Check if player has reports - returns array of reports
        function getPlayerReports(steamId) {
            const reports = reportsData.filter(report => {
                const intruderSteamId = String(report.intruder_steamid || '').trim();
                const checkSteamId = String(steamId).trim();
                return intruderSteamId === checkSteamId;
            });
            return reports;
        }
        
        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'Неизвестно';
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'Только что';
            if (diffMins < 60) return `${diffMins} мин назад`;
            if (diffHours < 24) return `${diffHours} ч назад`;
            if (diffDays < 7) return `${diffDays} дн назад`;
            
            return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }
        
        // Extract Steam ID from various formats
        function extractSteamId(input) {
            input = input.trim();
            
            // Already a Steam ID
            if (/^765\d{14}$/.test(input)) {
                return input;
            }
            
            // Steam profile URL
            const profileMatch = input.match(/steamcommunity\.com\/profiles\/(\d+)/);
            if (profileMatch) {
                return profileMatch[1];
            }
            
            alert('Используйте Steam ID (числовой) или ссылку на профиль');
            return null;
        }
        
        // Fetch servers data
        async function fetchServers() {
            try {
                const servers = await apiClient.fetchServers();
                serversData = Array.isArray(servers) ? servers : [];
                console.log('[Tracking] Servers loaded:', serversData.length);
                return serversData;
            } catch (error) {
                console.error('[Tracking] Error fetching servers:', error);
                return [];
            }
        }
        
        // Check if player is online and get server info
        function checkPlayerOnline(steamId) {
            for (const server of serversData) {
                const liveData = server.live_data || {};
                const players = liveData.players || [];
                
                const found = players.find(p => p.steam_id === steamId);
                if (found) {
                    return {
                        online: true,
                        serverName: server.site_name || 'Unknown Server',
                        serverIp: server.ip,
                        serverPort: server.port,
                        player: found
                    };
                }
            }
            return { online: false };
        }
        
        // Add player to tracking
        async function addPlayer() {
            const input = document.getElementById('searchInput').value.trim();
            if (!input) {
                alert('Введите SteamID');
                return;
            }
            
            const steamId = extractSteamId(input);
            if (!steamId) return;
            
            // Check if already tracked
            if (trackedPlayers.includes(steamId)) {
                alert('Игрок уже в списке отслеживания');
                return;
            }
            
            trackedPlayers.push(steamId);
            localStorage.setItem('trackedPlayers', JSON.stringify(trackedPlayers));
            
            document.getElementById('searchInput').value = '';
            await refreshTracking();
        }
        
        // Remove player from tracking
        function removePlayer(steamId) {
            if (confirm('Удалить игрока из отслеживания?')) {
                trackedPlayers = trackedPlayers.filter(id => id !== steamId);
                localStorage.setItem('trackedPlayers', JSON.stringify(trackedPlayers));
                refreshTracking();
            }
        }
        
        // Refresh tracking data
        async function refreshTracking() {
            const container = document.getElementById('resultsContainer');
            
            if (trackedPlayers.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">🔎</div><div class="empty-text">Нет отслеживаемых игроков</div><div class="empty-subtext">Добавьте игроков для отслеживания</div></div>';
                return;
            }
            
            container.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">Загрузка...</div></div>';
            
            // Load servers and reports in parallel
            await Promise.all([fetchServers(), fetchReports()]);
            
            container.innerHTML = '';
            
            // Load all player data in parallel
            const playerDataPromises = trackedPlayers.map(async (steamId) => {
                const status = checkPlayerOnline(steamId);
                const playerReports = getPlayerReports(steamId);
                
                // Fetch player profile from Fear API
                let playerData = { 
                    name: 'Unknown', 
                    avatar: null,
                    lastActivity: 'Неизвестно'
                };
                
                try {
                    const response = await fetch(`/api/player?steamid=${steamId}`);
                    if (response.ok) {
                        const profile = await response.json();
                        console.log('[Tracking] Player profile for', steamId, ':', profile);
                        
                        // Proxy avatar through our endpoint to avoid CORS
                        let avatarUrl = profile.avatar_full || profile.avatar_medium || profile.avatar || null;
                        if (avatarUrl) {
                            avatarUrl = `/api/avatar?url=${encodeURIComponent(avatarUrl)}`;
                        }
                        
                        playerData = {
                            name: profile.name || 'Unknown',
                            avatar: avatarUrl,
                            lastActivity: profile.last_activity ? formatLastActivity(profile.last_activity) : 'Неизвестно'
                        };
                    } else {
                        console.error('[Tracking] Player API returned', response.status, 'for', steamId);
                    }
                } catch (error) {
                    console.error('[Tracking] Error fetching player profile:', error);
                }
                
                // Generate placeholder avatar if no avatar from API
                if (!playerData.avatar) {
                    const colors = ['667eea', '764ba2', 'f093fb', 'f5576c', '4facfe', '00f2fe', '43e97b', '38f9d7', 'fa709a', 'fee140'];
                    const colorIndex = parseInt(steamId.slice(-2)) % colors.length;
                    const color = colors[colorIndex];
                    playerData.avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(playerData.name)}&background=${color}&color=fff&size=128&bold=true`;
                } else {
                    // Proxy Steam avatars through our server to avoid CORS issues
                    playerData.avatar = `/api/avatar-proxy?url=${encodeURIComponent(playerData.avatar)}`;
                }
                
                return { steamId, status, playerReports, playerData };
            });
            
            // Wait for all player data to load
            const allPlayerData = await Promise.all(playerDataPromises);
            
            // Render all cards
            allPlayerData.forEach(({ steamId, status, playerReports, playerData }) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                
                // Add red border if player has reports
                if (playerReports.length > 0) {
                    card.style.borderColor = '#ef4444';
                    card.style.borderWidth = '3px';
                    card.style.boxShadow = '0 0 30px rgba(239, 68, 68, 0.5), 0 4px 15px rgba(0, 0, 0, 0.3)';
                }
                
                const serverIp = status.online && status.serverIp && status.serverPort 
                    ? `${status.serverIp}:${status.serverPort}` 
                    : null;
                
                // Build reports display
                const reportsDisplay = playerReports.length > 0 
                    ? `<span style="color: #ef4444; font-weight: 900; font-size: 16px;">⚠️ ${playerReports.length}</span>` 
                    : `<span style="color: #22c55e">0</span>`;
                
                card.innerHTML = `
                    <div class="result-header">
                        <img src="${playerData.avatar || 'https://steamcdn-a.akamaihd.net/steamcommunity/public/images/avatars/fe/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'}" alt="${playerData.name}" class="result-avatar" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(playerData.name)}&background=667eea&color=fff&size=128';">
                        <div class="result-info">
                            <h3 title="${playerData.name}">${playerData.name}</h3>
                            <div class="result-steamid">${steamId}</div>
                        </div>
                    </div>
                    <div class="result-details">
                        <div class="detail-row">
                            <span class="detail-label">Статус</span>
                            <span class="detail-value">${status.online ? '🟢 Онлайн' : '🔴 Оффлайн'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Сервер</span>
                            <span class="detail-value" title="${status.serverName || 'Не в сети'}">${status.serverName || 'Не в сети'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Репорты</span>
                            <span class="detail-value">${reportsDisplay}</span>
                        </div>
                    </div>
                    <div class="actions-row">
                        <button class="action-btn btn-copy" onclick="copyIP('${serverIp || 'N/A'}')" ${!serverIp ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>📋 IP</button>
                        <button class="action-btn btn-connect" onclick="connectToServer('${serverIp || ''}')" ${!serverIp ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>🎮 Играть</button>
                        <button class="action-btn btn-profile" onclick="openFearProfile('${steamId}')">👤 Fear</button>
                        <button class="action-btn btn-remove" onclick="removePlayer('${steamId}')">🗑️ Удалить</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        // Format last activity timestamp
        function formatLastActivity(timestamp) {
            if (!timestamp) return 'Неизвестно';
            
            const date = new Date(timestamp * 1000); // Convert Unix timestamp to milliseconds
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'Только что';
            if (diffMins < 60) return `${diffMins} мин назад`;
            if (diffHours < 24) return `${diffHours} ч назад`;
            if (diffDays < 7) return `${diffDays} дн назад`;
            
            return date.toLocaleDateString('ru-RU');
        }
        
        // Action button functions
        function copyIP(ip) {
            if (!ip || ip === 'N/A') {
                alert('IP недоступен (игрок не в сети)');
                return;
            }
            navigator.clipboard.writeText(ip).then(() => {
                alert(`IP скопирован: ${ip}`);
            }).catch(err => {
                console.error('Ошибка копирования:', err);
            });
        }
        
        function connectToServer(ip) {
            if (!ip) {
                alert('Невозможно подключиться (игрок не в сети)');
                return;
            }
            window.location.href = `steam://connect/${ip}`;
        }
        
        function openFearProfile(steamId) {
            window.open(`https://fearproject.ru/profile/${steamId}`, '_blank');
        }
        
        // Enter key support
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addPlayer();
            }
        });
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            refreshTracking();
            // Auto-refresh every 30 seconds
            setInterval(refreshTracking, 30000);
        });
        
        // Update search button
        document.querySelector('.search-btn').onclick = addPlayer;
    </script>
</body>
</html>
