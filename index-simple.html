<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fear Protection - Проверка config.vdf</title>
    <link rel="icon" href="./9574.ico" type="image/x-icon">
    <style>
        /* Минимальные стили для загрузочного экрана */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            text-align: center;
        }
        
        .loading-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            background: #667eea;
            border-radius: 20px;
            animation: pulse 2s infinite;
        }
        
        .loading-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .loading-subtitle {
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s linear infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
        
        #mainContainer {
            display: none;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- Простейший загрузочный экран -->
    <div id="loadingScreen">
        <div class="loading-icon"></div>
        <h1 class="loading-title">Добро пожаловать</h1>
        <p class="loading-subtitle">Fear Protection - система проверки игроков</p>
        <div class="loading-spinner"></div>
    </div>
    
    <!-- Основной контент -->
    <div id="mainContainer">
        <h1>Fear Protection - Проверка config.vdf</h1>
        <p>Загрузочный экран должен был скрыться через 3 секунды.</p>
        <p>Если вы видите этот текст, значит загрузочный экран работал правильно.</p>
    </div>
    
    <script>
        // Простейший скрипт для загрузочного экрана
        console.log('Страница загружается...');
        
        window.addEventListener('DOMContentLoaded', function() {
            console.log('DOM загружен');
            
            const loadingScreen = document.getElementById('loadingScreen');
            const mainContainer = document.getElementById('mainContainer');
            
            // Ждем 3 секунды, потом показываем основной контент
            setTimeout(function() {
                console.log('3 секунды прошли, скрываем загрузочный экран');
                
                // Скрываем загрузочный экран
                loadingScreen.classList.add('hidden');
                
                // Показываем основной контент
                mainContainer.style.display = 'block';
                
            }, 3000); // 3 секунды
        });
        
        console.log('Скрипты загружены');
    </script>
</body>
</html>
