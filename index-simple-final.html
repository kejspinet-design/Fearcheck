<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Fear Protection - Проверка config.vdf</title>
    <link rel="icon" href="./9574.ico" type="image/x-icon">
    <link rel="shortcut icon" href="./9574.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="./9574.ico">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Imports -->
    <link rel="stylesheet" href="css/base.css?v=20260430004">
    <link rel="stylesheet" href="css/style.css?v=20260430004">
    <link rel="stylesheet" href="css/dashboard.css?v=20260430004">
    <link rel="stylesheet" href="css/check.css?v=20260430004">
    <link rel="stylesheet" href="css/simple-loading.css?v=2026050102">
</head>
<body>
    <!-- Простой загрузочный экран -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-icon">
                <img src="./9574.ico" alt="Fear Protection">
            </div>
            <h1 class="loading-title">Добро пожаловать</h1>
            <p class="loading-subtitle">Fear Protection - система проверки игроков на баны<br>Загрузите файл config.vdf для начала проверки</p>
            <div class="loading-spinner"></div>
        </div>
    </div>
    
    <!-- Основной контент -->
    <div class="container" id="mainContainer" style="display: none;">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <!-- Logo and Title -->
                <div class="header-title-section">
                    <h1 class="logo-container">
                        <img src="./9574.ico" alt="Fear Protection" style="width: 44px; height: 44px; border-radius: 8px;">
                        <span class="logo-text">Fear Protection - Проверка config.vdf</span>
                    </h1>
                </div>
            </div>
        </header>
        
        <!-- Main Content -->
        <main class="check-main">
            <!-- Single Column Grid Layout -->
            <div class="check-container" style="grid-template-columns: 1fr; max-width: 800px; margin: 0 auto;">
                <!-- Config.vdf Checker -->
                <div class="check-section">
                    <div class="section-header">
                        <h2>Проверка config.vdf</h2>
                        <span class="section-count" id="configCheckCount">0</span>
                    </div>
                    <div class="config-checker-container">
                        <div class="config-upload-area" id="configUploadArea">
                            <div class="upload-icon">📁</div>
                            <p class="upload-text">Перетащите config.vdf сюда</p>
                            <p class="upload-subtext">или</p>
                            <label for="configFileInput" class="upload-button">Выбрать файл</label>
                            <input type="file" id="configFileInput" accept=".vdf,.cfg" style="display: none;">
                            <p class="upload-hint">Поддерживаются файлы: config.vdf, config.cfg</p>
                        </div>
                        <div class="players-list" id="config-check-column" style="display: none;">
                            <!-- Checked players will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- JavaScript Modules -->
    <script src="js/APIClient.js?v=20260430003"></script>
    <script src="js/ModalManager.js?v=20260430003"></script>
    <script src="js/ConfigChecker.js?v=20260430003"></script>
    <script src="js/CheckPage.js?v=20260430003"></script>
    
    <script>
        // Простой скрипт для загрузочного экрана
        console.log('Страница загружается...');
        
        window.addEventListener('DOMContentLoaded', function() {
            console.log('DOM загружен');
            
            const loadingScreen = document.getElementById('loadingScreen');
            const mainContainer = document.getElementById('mainContainer');
            
            // Ждем 3 секунды, потом показываем основной контент
            setTimeout(function() {
                console.log('3 секунды прошли, скрываем загрузочный экран');
                
                // Скрываем загрузочный экран
                loadingScreen.classList.add('hidden');
                
                // Показываем основной контент
                mainContainer.style.display = 'block';
                
                // Инициализируем страницу
                console.log('Инициализация CheckPage...');
                try {
                    const checkPage = new CheckPage();
                    console.log('CheckPage успешно инициализирован');
                } catch (error) {
                    console.error('Ошибка инициализации CheckPage:', error);
                }
                
            }, 3000); // 3 секунды
        });
        
        // Глобальная функция копирования
        window.copyToClipboard = function(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const originalHTML = button.innerHTML;
                button.classList.add('copied');
                button.innerHTML = 'Скопировано!';
                
                setTimeout(() => {
                    button.classList.remove('copied');
                    button.innerHTML = originalHTML;
                }, 2000);
            }).catch(err => {
                console.error('Ошибка копирования:', err);
                alert('Ошибка копирования');
            });
        };
        
        console.log('Скрипты загружены');
    </script>
</body>
</html>
