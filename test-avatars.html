<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест аватарок</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }
        button {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .success {
            color: #4ade80;
        }
        .error {
            color: #f87171;
        }
        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin-right: 15px;
        }
        .player-info {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .avatar-test {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .avatar-item {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            width: 120px;
        }
        .avatar-img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
        }
        .avatar-placeholder {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Тест аватарок и ников игроков</h1>
        
        <div class="test-section">
            <h2>Тест 1: Прямой запрос к API</h2>
            <button onclick="testDirectAPI()">Тест API /profile/76561199847445471</button>
            <div id="directResult" class="result"></div>
        </div>
        
        <div class="test-section">
            <h2>Тест 2: Локальный прокси</h2>
            <button onclick="testLocalProxy()">Тест /api/player?steamid=76561199847445471</button>
            <div id="proxyResult" class="result"></div>
        </div>
        
        <div class="test-section">
            <h2>Тест 3: Несколько Steam ID</h2>
            <div class="avatar-test" id="multipleAvatars">
                <!-- Будут загружены аватарки -->
            </div>
            <button onclick="testMultipleAvatars()">Загрузить аватарки для тестовых ID</button>
        </div>
        
        <div class="test-section">
            <h2>Тест 4: Проверка формата данных</h2>
            <button onclick="testDataFormat()">Проверить формат данных</button>
            <div id="formatResult" class="result"></div>
        </div>
    </div>
    
    <script>
        // Тестовые Steam ID из test-config.vdf
        const testSteamIds = [
            "76561199881908264",
            "76561198881908265", 
            "76561197881908266"
        ];
        
        async function testDirectAPI() {
            const resultDiv = document.getElementById('directResult');
            resultDiv.innerHTML = 'Запрос к API...';
            
            try {
                const response = await fetch('https://api.fearproject.ru/profile/76561199847445471');
                const data = await response.json();
                
                let html = `<div class="player-info">
                    <img src="${data.avatar_full || data.avatar}" alt="Avatar" class="avatar" onerror="this.onerror=null;this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjQiIGhlaWdodD0iNjQiIHZpZXdCb3g9IjAgMCA2NCA2NCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIzMiIgY3k9IjMyIiByPSIzMiIgZmlsbD0iIzY2N2VlYSIvPHRleHQgeD0iMzIiIHk9IjM4IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSJ3aGl0ZSIgZm9udC1mYW1pbHk9IkludGVyIiBmb250LXNpemU9IjI0Ij7wn5C6PC90ZXh0Pjwvc3ZnPg=='">
                    <div>
                        <strong>Ник:</strong> ${data.name || 'Не указан'}<br>
                        <strong>Steam ID:</strong> ${data.steamid}<br>
                        <strong>Аватар (full):</strong> ${data.avatar_full || 'Нет'}<br>
                        <strong>Аватар (medium):</strong> ${data.avatar_medium || 'Нет'}<br>
                        <strong>Аватар (small):</strong> ${data.avatar || 'Нет'}
                    </div>
                </div>`;
                
                html += `<pre class="success">${JSON.stringify(data, null, 2)}</pre>`;
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">Ошибка: ${error.message}</pre>`;
            }
        }
        
        async function testLocalProxy() {
            const resultDiv = document.getElementById('proxyResult');
            resultDiv.innerHTML = 'Запрос к локальному прокси...';
            
            try {
                const response = await fetch('/api/player?steamid=76561199847445471');
                const data = await response.json();
                
                let html = `<div class="player-info">
                    <img src="${data.avatar_full || data.avatar}" alt="Avatar" class="avatar" onerror="this.onerror=null;this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjQiIGhlaWdodD0iNjQiIHZpZXdCb3g9IjAgMCA2NCA2NCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIzMiIgY3k9IjMyIiByPSIzMiIgZmlsbD0iIzY2N2VlYSIvPHRleHQgeD0iMzIiIHk9IjM4IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSJ3aGl0ZSIgZm9udC1mYW1pbHk9IkludGVyIiBmb250LXNpemU9IjI0Ij7wn5C6PC90ZXh0Pjwvc3ZnPg=='">
                    <div>
                        <strong>Ник:</strong> ${data.name || 'Не указан'}<br>
                        <strong>Steam ID:</strong> ${data.steamid}<br>
                        <strong>Аватар (full):</strong> ${data.avatar_full || 'Нет'}<br>
                        <strong>Аватар (medium):</strong> ${data.avatar_medium || 'Нет'}<br>
                        <strong>Аватар (small):</strong> ${data.avatar || 'Нет'}
                    </div>
                </div>`;
                
                html += `<pre class="success">${JSON.stringify(data, null, 2)}</pre>`;
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">Ошибка: ${error.message}<br>Убедитесь, что локальный сервер запущен (node server.js)</pre>`;
            }
        }
        
        async function testMultipleAvatars() {
            const container = document.getElementById('multipleAvatars');
            container.innerHTML = '<p>Загрузка аватарок...</p>';
            
            const results = [];
            
            for (const steamId of testSteamIds) {
                try {
                    const response = await fetch(`/api/player?steamid=${steamId}`);
                    const data = await response.json();
                    
                    results.push({
                        steamId,
                        name: data.name,
                        avatar: data.avatar_full || data.avatar,
                        hasAvatar: !!(data.avatar_full || data.avatar)
                    });
                } catch (error) {
                    results.push({
                        steamId,
                        name: null,
                        avatar: null,
                        hasAvatar: false,
                        error: error.message
                    });
                }
            }
            
            let html = '';
            results.forEach(result => {
                html += `<div class="avatar-item">
                    ${result.avatar ? 
                        `<img src="${result.avatar}" alt="Avatar" class="avatar-img" onerror="this.onerror=null;this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjQiIGhlaWdodD0iNjQiIHZpZXdCb3g9IjAgMCA2NCA2NCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIzMiIgY3k9IjMyIiByPSIzMiIgZmlsbD0iIzY2N2VlYSIvPjx0ZXh0IHg9IjMyIiB5PSIzOCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0id2hpdGUiIGZvbnQtZmFtaWx5PSJJbnRlciIgZm9udC1zaXplPSIyNCI+8J+QujwvdGV4dD48L3N2Zz4='">` : 
                        `<div class="avatar-placeholder">👤</div>`}
                    <div><strong>${result.name || 'Нет ника'}</strong></div>
                    <div style="font-size: 12px; opacity: 0.7;">${result.steamId.substring(0, 10)}...</div>
                    <div style="font-size: 12px; margin-top: 5px; color: ${result.hasAvatar ? '#4ade80' : '#f87171'}">
                        ${result.hasAvatar ? '✅ Есть аватар' : '❌ Нет аватара'}
                    </div>
                </div>`;
            });
            
            container.innerHTML = html;
        }
        
        async function testDataFormat() {
            const resultDiv = document.getElementById('formatResult');
            resultDiv.innerHTML = 'Проверка формата данных...';
            
            try {
                const response = await fetch('/api/player?steamid=76561199847445471');
                const data = await response.json();
                
                const checks = [
                    { field: 'steamid', exists: !!data.steamid, value: data.steamid },
                    { field: 'name', exists: !!data.name, value: data.name },
                    { field: 'avatar', exists: !!data.avatar, value: data.avatar ? 'Есть' : 'Нет' },
                    { field: 'avatar_full', exists: !!data.avatar_full, value: data.avatar_full ? 'Есть' : 'Нет' },
                    { field: 'avatar_medium', exists: !!data.avatar_medium, value: data.avatar_medium ? 'Есть' : 'Нет' }
                ];
                
                let html = '<h3>Проверка полей:</h3>';
                checks.forEach(check => {
                    html += `<div style="margin: 5px 0; padding: 5px; background: ${check.exists ? 'rgba(74, 222, 128, 0.2)' : 'rgba(248, 113, 113, 0.2)'}; border-radius: 5px;">
                        ${check.exists ? '✅' : '❌'} ${check.field}: ${check.value || 'null/undefined'}
                    </div>`;
                });
                
                html += '<h3>Рекомендации для ConfigChecker.js:</h3>';
                html += `<pre>
// Текущая логика в ConfigChecker.js:
const nickname = (data.name && data.name !== 'undefined') ? data.name : null;
const avatar = data.avatar_full || data.avatar || null;

// Проверка:
${checks[1].exists ? '✅ Поле name существует' : '❌ Поле name отсутствует'}
${checks[3].exists || checks[2].exists ? '✅ Поле avatar_full или avatar существует' : '❌ Оба поля avatar отсутствуют'}
                </pre>`;
                
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">Ошибка: ${error.message}</pre>`;
            }
        }
        
        // Автоматически тестируем при загрузке
        window.addEventListener('DOMContentLoaded', () => {
            testMultipleAvatars();
        });
    </script>
</body>
</html>
