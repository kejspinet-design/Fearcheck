<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест API</title>
</head>
<body>
    <h1>Тестирование API Endpoints</h1>
    
    <div>
        <h2>Тест API банов</h2>
        <input type="text" id="steamId" value="76561199881908264" placeholder="Введите Steam ID">
        <button onclick="testFearApi()">Тест Fear API</button>
        <div id="fearResult" style="margin-top: 10px; padding: 10px; border: 1px solid #ccc; min-height: 50px;"></div>
    </div>
    
    <div>
        <h2>Тест API данных игрока</h2>
        <button onclick="testPlayerApi()">Тест Player API</button>
        <div id="playerResult" style="margin-top: 10px; padding: 10px; border: 1px solid #ccc; min-height: 50px;"></div>
    </div>
    
    <script>
        async function testFearApi() {
            const steamId = document.getElementById('steamId').value;
            const resultDiv = document.getElementById('fearResult');
            
            resultDiv.innerHTML = 'Загрузка...';
            
            try {
                const response = await fetch(`/api/fear?q=${encodeURIComponent(steamId)}&page=1&limit=10&type=1`);
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <strong>Статус:</strong> ${response.status}<br>
                    <strong>Результат:</strong> ${JSON.stringify(data, null, 2)}
                `;
            } catch (error) {
                resultDiv.innerHTML = `<strong>Ошибка:</strong> ${error.message}`;
            }
        }
        
        async function testPlayerApi() {
            const steamId = document.getElementById('steamId').value;
            const resultDiv = document.getElementById('playerResult');
            
            resultDiv.innerHTML = 'Загрузка...';
            
            try {
                const response = await fetch(`/api/player?steamid=${encodeURIComponent(steamId)}&mode=public`);
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <strong>Статус:</strong> ${response.status}<br>
                    <strong>Результат:</strong> ${JSON.stringify(data, null, 2)}
                `;
            } catch (error) {
                resultDiv.innerHTML = `<strong>Ошибка:</strong> ${error.message}`;
            }
        }
    </script>
</body>
</html>
