<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fear Protection</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;overflow:hidden}
.wrap{text-align:center}
.icon{width:110px;height:110px;background:linear-gradient(135deg,#dc2626,#8b5cf6);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:800;color:#fff;margin:0 auto 28px;animation:pulse 2s infinite;box-shadow:0 0 40px rgba(220,38,38,.6)}
h1{font-size:34px;font-weight:700;color:#fff;margin:0 0 12px}
p{font-size:16px;color:rgba(255,255,255,.7);margin:0 0 36px;line-height:1.6}
.spinner{width:52px;height:52px;border:4px solid rgba(220,38,38,.2);border-top-color:#dc2626;border-radius:50%;animation:spin .9s linear infinite;margin:0 auto;box-shadow:0 0 20px rgba(220,38,38,.4)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">FP</div>
  <h1>Добро пожаловать</h1>
  <p>Fear Protection — система проверки игроков на баны<br>Загрузите файл config.vdf для начала проверки</p>
  <div class="spinner"></div>
</div>
<script>
setTimeout(function(){ window.location.href = '/main'; }, 3000);
</script>
</body>
</html>
