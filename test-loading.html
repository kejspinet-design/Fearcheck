<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест загрузочного экрана</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        
        .test-info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 10000;
            max-width: 300px;
        }
        
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <div class="test-info">
        <h3>Тест загрузочного экрана</h3>
        <p>Откройте консоль (F12) для проверки:</p>
        <ul>
            <li>1. Должен быть виден загрузочный экран</li>
            <li>2. Должна быть анимация спиннера</li>
            <li>3. Должна быть анимация прогресс-бара</li>
            <li>4. Через 3-5 секунд должен появиться основной контент</li>
        </ul>
        <button onclick="location.reload()">Перезагрузить</button>
    </div>
    
    <iframe src="/"></iframe>
    
    <script>
        // Проверка через iframe
        const iframe = document.querySelector('iframe');
        
        iframe.onload = function() {
            console.log('Iframe загружен');
            
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                const loadingScreen = iframeDoc.getElementById('loadingScreen');
                const mainContainer = iframeDoc.getElementById('mainContainer');
                
                console.log('Loading screen found:', !!loadingScreen);
                console.log('Main container found:', !!mainContainer);
                console.log('Loading screen display:', loadingScreen ? loadingScreen.style.display : 'N/A');
                console.log('Main container display:', mainContainer ? mainContainer.style.display : 'N/A');
                
                // Проверка через 1 секунду
                setTimeout(() => {
                    console.log('После 1 секунды:');
                    console.log('Loading screen display:', loadingScreen ? loadingScreen.style.display : 'N/A');
                    console.log('Main container display:', mainContainer ? mainContainer.style.display : 'N/A');
                }, 1000);
                
                // Проверка через 3 секунды
                setTimeout(() => {
                    console.log('После 3 секунд:');
                    console.log('Loading screen display:', loadingScreen ? loadingScreen.style.display : 'N/A');
                    console.log('Main container display:', mainContainer ? mainContainer.style.display : 'N/A');
                    console.log('Loading screen classList:', loadingScreen ? loadingScreen.classList.toString() : 'N/A');
                }, 3000);
                
                // Проверка через 6 секунд
                setTimeout(() => {
                    console.log('После 6 секунд:');
                    console.log('Loading screen display:', loadingScreen ? loadingScreen.style.display : 'N/A');
                    console.log('Main container display:', mainContainer ? mainContainer.style.display : 'N/A');
                    console.log('Loading screen classList:', loadingScreen ? loadingScreen.classList.toString() : 'N/A');
                }, 6000);
                
            } catch (error) {
                console.error('Ошибка проверки:', error);
            }
        };
        
        // Если iframe не загрузился за 5 секунд
        setTimeout(() => {
            if (!iframe.contentDocument) {
                console.error('Iframe не загрузился за 5 секунд');
            }
        }, 5000);
    </script>
</body>
</html>
