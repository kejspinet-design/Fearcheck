<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест загрузочного экрана</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
        }
        
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: red !important; /* ЯРКИЙ КРАСНЫЙ, чтобы было видно */
            display: flex !important;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-size: 48px;
            font-weight: bold;
        }
        
        #mainContent {
            display: none;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- ЯРКИЙ КРАСНЫЙ ЭКРАН - ДОЛЖЕН БЫТЬ ВИДЕН СРАЗУ -->
    <div id="loadingScreen" style="background: red !important;">
        ЗАГРУЗОЧНЫЙ ЭКРАН - ДОЛЖЕН БЫТЬ ВИДЕН!
    </div>
    
    <div id="mainContent">
        <h1>Основной контент</h1>
        <p>Если вы это видите, значит загрузочный экран скрылся.</p>
    </div>
    
    <script>
        console.log('=== ТЕСТ НАЧАЛСЯ ===');
        console.log('Загрузочный экран должен быть ЯРКО-КРАСНЫМ');
        
        // Проверяем элементы
        const loadingScreen = document.getElementById('loadingScreen');
        const mainContent = document.getElementById('mainContent');
        
        console.log('loadingScreen:', loadingScreen);
        console.log('mainContent:', mainContent);
        
        if (loadingScreen) {
            console.log('loadingScreen найден');
            console.log('display:', loadingScreen.style.display);
            console.log('computed display:', window.getComputedStyle(loadingScreen).display);
            console.log('background:', loadingScreen.style.background);
            console.log('computed background:', window.getComputedStyle(loadingScreen).backgroundColor);
        }
        
        // Ждем 5 секунд и скрываем
        setTimeout(function() {
            console.log('5 секунд прошли, скрываем загрузочный экран');
            
            if (loadingScreen) {
                loadingScreen.style.display = 'none';
            }
            
            if (mainContent) {
                mainContent.style.display = 'block';
            }
            
            console.log('Тест завершен');
        }, 5000);
        
        console.log('=== ТЕСТ ЗАПУЩЕН ===');
    </script>
</body>
</html>
