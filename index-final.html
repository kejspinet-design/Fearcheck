<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fear Protection - Проверка config.vdf</title>
    <link rel="icon" href="./9574.ico" type="image/x-icon">
    <style>
        /* ВСЕ стили inline - никаких внешних файлов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            position: relative;
        }
        
        /* АНИМИРОВАННЫЙ ФОН */
        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        /* Летающие точки */
        .floating-dots {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }
        
        .dot:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 20s; }
        .dot:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 18s; }
        .dot:nth-child(3) { left: 30%; animation-delay: 4s; animation-duration: 22s; }
        .dot:nth-child(4) { left: 40%; animation-delay: 6s; animation-duration: 16s; }
        .dot:nth-child(5) { left: 50%; animation-delay: 8s; animation-duration: 24s; }
        .dot:nth-child(6) { left: 60%; animation-delay: 10s; animation-duration: 19s; }
        .dot:nth-child(7) { left: 70%; animation-delay: 12s; animation-duration: 21s; }
        .dot:nth-child(8) { left: 80%; animation-delay: 14s; animation-duration: 17s; }
        .dot:nth-child(9) { left: 90%; animation-delay: 16s; animation-duration: 23s; }
        .dot:nth-child(10) { left: 15%; animation-delay: 18s; animation-duration: 25s; }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(50px);
                opacity: 0;
            }
        }
        
        /* Красное мерцание снизу */
        .red-glow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to top, rgba(220, 38, 38, 0.3) 0%, rgba(220, 38, 38, 0.1) 50%, transparent 100%);
            animation: redPulse 4s ease-in-out infinite;
        }
        
        @keyframes redPulse {
            0%, 100% {
                opacity: 0.3;
                transform: scaleY(1);
            }
            50% {
                opacity: 0.6;
                transform: scaleY(1.1);
            }
        }
        
        /* ЗАГРУЗОЧНЫЙ ЭКРАН - всегда виден при загрузке */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            text-align: center;
        }
        
        .loading-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
            background: #667eea;
            border-radius: 25px;
            animation: pulse 2s infinite;
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.5);
        }
        
        .loading-title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
            color: white;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.7);
        }
        
        .loading-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.6;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
        
        /* ОСНОВНОЙ КОНТЕНТ - изначально скрыт */
        #mainContainer {
            display: none;
            padding: 20px;
            min-height: 100vh;
            background: #0a0a0a;
        }
        
        .header {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-container img {
            width: 44px;
            height: 44px;
            border-radius: 8px;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }
        
        .check-section {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-header h2 {
            font-size: 22px;
            color: white;
        }
        
        .section-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .config-upload-area {
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            background: rgba(102, 126, 234, 0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .config-upload-area:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #7aa2ff;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 18px;
            color: white;
            margin-bottom: 10px;
        }
        
        .upload-subtext {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
        }
        
        .upload-button {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        
        .upload-button:hover {
            background: #7aa2ff;
            transform: translateY(-2px);
        }
        
        .upload-hint {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- АНИМИРОВАННЫЙ ФОН -->
    <div class="animated-background">
        <div class="floating-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="red-glow"></div>
    </div>
    
    <!-- ЗАГРУЗОЧНЫЙ ЭКРАН - ВИДЕН СРАЗУ -->
    <div id="loadingScreen">
        <div class="loading-icon"></div>
        <h1 class="loading-title">Добро пожаловать</h1>
        <p class="loading-subtitle">Fear Protection - система проверки игроков на баны<br>Загрузите файл config.vdf для начала проверки</p>
        <div class="loading-spinner"></div>
    </div>
    
    <!-- ОСНОВНОЙ КОНТЕНТ - СКРЫТ ДО ЗАВЕРШЕНИЯ ЗАГРУЗКИ -->
    <div id="mainContainer">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <img src="./9574.ico" alt="Fear Protection">
                <span class="logo-text">Fear Protection - Проверка config.vdf</span>
            </div>
        </header>
        
        <!-- Main Content -->
        <main>
            <div class="check-section">
                <div class="section-header">
                    <h2>Проверка config.vdf</h2>
                    <span class="section-count" id="configCheckCount">0</span>
                </div>
                <div class="config-upload-area" id="configUploadArea">
                    <div class="upload-icon">📁</div>
                    <p class="upload-text">Перетащите config.vdf сюда</p>
                    <p class="upload-subtext">или</p>
                    <label for="configFileInput" class="upload-button">Выбрать файл</label>
                    <input type="file" id="configFileInput" accept=".vdf,.cfg" style="display: none;">
                    <p class="upload-hint">Поддерживаются файлы: config.vdf, config.cfg</p>
                </div>
                <div id="config-check-column" style="display: none; margin-top: 20px;">
                    <!-- Проверенные игроки будут здесь -->
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // ПРОСТОЙ И НАДЕЖНЫЙ СКРИПТ ДЛЯ ЗАГРУЗОЧНОГО ЭКРАНА
        console.log('=== НАЧАЛО ЗАГРУЗКИ СТРАНИЦЫ ===');
        
        // Функция для скрытия загрузочного экрана
        function hideLoadingScreen() {
            console.log('Скрываем загрузочный экран...');
            const loadingScreen = document.getElementById('loadingScreen');
            const mainContainer = document.getElementById('mainContainer');
            
            if (loadingScreen) {
                loadingScreen.classList.add('hidden');
                console.log('Загрузочный экран скрыт');
            }
            
            if (mainContainer) {
                mainContainer.style.display = 'block';
                console.log('Основной контент показан');
            }
        }
        
        // Функция для показа ошибки
        function showError(message) {
            console.error('ОШИБКА:', message);
            const loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen) {
                loadingScreen.innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <div style="font-size: 64px; margin-bottom: 20px;">⚠️</div>
                        <h1 style="color: #ff4757; margin-bottom: 20px;">${message}</h1>
                        <p style="color: rgba(255, 255, 255, 0.8); margin-bottom: 30px;">
                            Проверьте консоль (F12) для подробной информации
                        </p>
                        <button onclick="location.reload()" style="
                            background: #ff4757;
                            color: white;
                            border: none;
                            padding: 12px 30px;
                            border-radius: 10px;
                            font-weight: bold;
                            cursor: pointer;
                            font-size: 16px;
                        ">
                            Перезагрузить страницу
                        </button>
                    </div>
                `;
            }
        }
        
        // Основная функция инициализации
        function initializePage() {
            console.log('Инициализация страницы...');
            
            try {
                // Проверяем, что все необходимые элементы существуют
                const loadingScreen = document.getElementById('loadingScreen');
                const mainContainer = document.getElementById('mainContainer');
                
                if (!loadingScreen) {
                    throw new Error('Элемент loadingScreen не найден');
                }
                
                if (!mainContainer) {
                    throw new Error('Элемент mainContainer не найден');
                }
                
                console.log('Все элементы найдены');
                console.log('Загрузочный экран виден:', loadingScreen.style.display !== 'none');
                console.log('Основной контент скрыт:', mainContainer.style.display === 'none');
                
                // Ждем 3 секунды и скрываем загрузочный экран
                setTimeout(() => {
                    hideLoadingScreen();
                    
                    // Инициализируем функционал страницы
                    initializeFileUpload();
                    
                }, 3000);
                
            } catch (error) {
                console.error('Ошибка инициализации:', error);
                showError('Ошибка загрузки страницы: ' + error.message);
            }
        }
        
        // Функция для инициализации загрузки файлов
        function initializeFileUpload() {
            console.log('Инициализация загрузки файлов...');
            
            const fileInput = document.getElementById('configFileInput');
            const uploadArea = document.getElementById('configUploadArea');
            
            if (fileInput && uploadArea) {
                // Клик по области загрузки
                uploadArea.addEventListener('click', () => {
                    fileInput.click();
                });
                
                // Выбор файла
                fileInput.addEventListener('change', (event) => {
                    const file = event.target.files[0];
                    if (file) {
                        console.log('Выбран файл:', file.name);
                        alert('Файл выбран: ' + file.name + '\nФункция проверки будет реализована позже.');
                    }
                });
                
                // Drag and drop
                uploadArea.addEventListener('dragover', (event) => {
                    event.preventDefault();
                    uploadArea.style.background = 'rgba(102, 126, 234, 0.3)';
                    uploadArea.style.borderColor = '#7aa2ff';
                });
                
                uploadArea.addEventListener('dragleave', () => {
                    uploadArea.style.background = 'rgba(102, 126, 234, 0.1)';
                    uploadArea.style.borderColor = '#667eea';
                });
                
                uploadArea.addEventListener('drop', (event) => {
                    event.preventDefault();
                    uploadArea.style.background = 'rgba(102, 126, 234, 0.1)';
                    uploadArea.style.borderColor = '#667eea';
                    
                    const file = event.dataTransfer.files[0];
                    if (file && (file.name.endsWith('.vdf') || file.name.endsWith('.cfg'))) {
                        console.log('Перетащен файл:', file.name);
                        alert('Файл перетащен: ' + file.name + '\nФункция проверки будет реализована позже.');
                    } else {
                        alert('Пожалуйста, выберите файл config.vdf или config.cfg');
                    }
                });
                
                console.log('Загрузка файлов инициализирована');
            }
        }
        
        // Запускаем инициализацию когда DOM загружен
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM полностью загружен');
            initializePage();
        });
        
        // Также запускаем инициализацию когда страница полностью загружена
        window.addEventListener('load', () => {
            console.log('Страница полностью загружена');
            console.log('=== ЗАГРУЗКА СТРАНИЦЫ ЗАВЕРШЕНА ===');
        });
        
        // Глобальная функция для копирования
        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Скопировано: ' + text);
            }).catch(err => {
                console.error('Ошибка копирования:', err);
                alert('Ошибка копирования');
            });
        };
        
        console.log('Скрипты загружены и готовы к выполнению');
    </script>
</body>
</html>
