<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Fear API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; }
        input { padding: 8px; margin: 5px; width: 200px; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h1>Fear API Test</h1>
    
    <div>
        <input type="text" id="steamId" placeholder="Steam ID" value="76561199881908264">
        <button onclick="testAPI()">Test /api/test</button>
        <button onclick="testFearAPI()">Test /api/fear</button>
        <button onclick="testDirectAPI()">Test Direct API</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>
    
    <div id="results"></div>

    <script>
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testAPI() {
            const resultsDiv = document.getElementById('results');
            
            try {
                resultsDiv.innerHTML += '<div class="result">Testing /api/test...</div>';
                
                const response = await fetch('/api/test?param=hello');
                const data = await response.json();
                
                if (response.ok) {
                    resultsDiv.innerHTML += `<div class="result success">
                        <strong>Test API Success:</strong><br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>`;
                } else {
                    resultsDiv.innerHTML += `<div class="result error">
                        <strong>Test API Error:</strong><br>
                        Status: ${response.status}<br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML += `<div class="result error">
                    <strong>Test API Exception:</strong><br>
                    ${error.message}
                </div>`;
            }
        }
        
        async function testFearAPI() {
            const steamId = document.getElementById('steamId').value;
            const resultsDiv = document.getElementById('results');
            
            try {
                resultsDiv.innerHTML += '<div class="result">Testing /api/fear...</div>';
                
                const response = await fetch(`/api/fear?q=${steamId}&page=1&limit=10&type=1`);
                const data = await response.json();
                
                if (response.ok) {
                    resultsDiv.innerHTML += `<div class="result success">
                        <strong>Fear API Success:</strong><br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>`;
                } else {
                    resultsDiv.innerHTML += `<div class="result error">
                        <strong>Fear API Error:</strong><br>
                        Status: ${response.status}<br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML += `<div class="result error">
                    <strong>Fear API Exception:</strong><br>
                    ${error.message}
                </div>`;
            }
        }
        
        async function testDirectAPI() {
            const steamId = document.getElementById('steamId').value;
            const resultsDiv = document.getElementById('results');
            
            try {
                resultsDiv.innerHTML += '<div class="result">Testing direct API (will fail due to CORS)...</div>';
                
                const response = await fetch(`https://api.fearproject.ru/punishments/search?q=${steamId}&page=1&limit=10&type=1`);
                const data = await response.json();
                
                resultsDiv.innerHTML += `<div class="result success">
                    <strong>Direct API Success (unexpected):</strong><br>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>`;
            } catch (error) {
                resultsDiv.innerHTML += `<div class="result error">
                    <strong>Direct API Failed (expected due to CORS):</strong><br>
                    ${error.message}
                </div>`;
            }
        }
    </script>
</body>
</html>
